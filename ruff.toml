# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "SIM",  # flake8-simplify
    "C901", # mccabe complexity
    "PLR",  # pylint refactor
    "RUF",  # ruff-specific
]

ignore = [
    "S101",    # assert used (OK in tests)
    "PLR0913", # too many arguments (sometimes necessary)
    "PLR2004", # magic value comparisons — intentional in assertions
    "S608",    # SQL injection false positive — f-strings for column names, values are parameterized (?)
    "E402",    # module-level import not at top — intentional after logger setup
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106", "PLR2004", "E501", "SIM115", "B017", "F841"]
# FastAPI route registration is inherently large/complex; Body() default is the FastAPI idiom
"ollama_queue/api.py" = ["B008", "B904", "C901", "PLR0912", "PLR0915"]
# Daemon poll loop is a single long method by design; shell=True is intentional for user commands
"ollama_queue/daemon.py" = ["C901", "PLR0912", "PLR0915", "S602", "S603", "S607"]
# Health checks run known system binaries (nvidia-smi, ollama) — not user input
"ollama_queue/health.py" = ["S607", "C901", "SIM105", "S110"]
# Admin migration script — subprocess calls use known binary paths, not user input
"scripts/*.py" = ["S603", "S607"]

[lint.mccabe]
max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
